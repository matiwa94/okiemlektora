<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kontakt | Okiem lektora</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" sizes="64x64" href="images/favicon.ico">
</head>
<body>

<!-- HEADER -->
<div id="header-container"></div>

<!-- NAWIGACJA -->
<nav>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div id="menu-container"></div>
</nav>

<main class="container">
    <div class="content">
        <article class="post">
            <h1>Kontakt</h1>
            <h2>Mateusz Iwańczak</h2>
            <p>e-mail.: <a href="mateusz.korepetycje7@gmail.com">mateusz.korepetycje7@gmail.com</a></p>
        </article>
    </div>

    <aside class="sidebar">
        <div id="nawigacja-container"></div>
        <h3>Kategorie</h3>
        <ul>
            <li><a href="#dane">Dane kontaktowe</a></li>
        </ul>
    </aside>
</main>

<!-- FOOTER -->
<div id="footer-container"></div>

<script>
function loadComponent(id, file) {
  fetch(file)
    .then(response => response.text())
    .then(data => {
      document.getElementById(id).innerHTML = data;
    });
}

loadComponent("header-container", "header.html");
loadComponent("menu-container", "menu.html");
loadComponent("nawigacja-container", "nawigacja.html");
loadComponent("footer-container", "footer.html");
</script>

<script src="clock.js"></script>

</body>
</html>
