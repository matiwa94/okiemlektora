<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Modlitwy, Pieśni, Katechizm, Lektor - Bóg i sens</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" sizes="64x64" href="images/bogisens.ico">
</head>
<body>

    <!-- Header z HTML -->
    <div id="header-container"></div>

    <!-- Nawigacja/menu -->
    <nav>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <div id="menu-container"></div>
    </nav>

    <!-- Zegar (JS) -->
    <div id="clock-container"></div>

    <!-- Główna zawartość -->
    <section>
        <main class="container">
    <aside class="sidebar" id="toc">
        <h3>Spis treści</h3>
        <ul>
            <li><a href="#r">Refleksje</a></li>
        </ul>
    </aside>

    <div class="content">

        <article class="post">
          <h1 id="r">Refleksje</h1>
            <h2>
              <a href="#" target="_blank" rel="noopener noreferrer">
                #
              </a>
            </h2>

        </article>
    </div>

</main>
</section>
    <section class="bibliografia">
    <h2>Bibliografia</h2>
  <ol>
        <li><a href="https://musicamsacram.pl/spiewnik/" target="_blank" rel="noopener noreferrer">
            https://musicamsacram.pl/spiewnik/
        </a></li>
    </ol>
    </section>

    <!-- Footer z HTML -->
    <div id="footer-container"></div>

    <!-- Skrypty -->
    <script>
      // Ładowanie header, menu i footer z plików HTML
      function loadHTML(id, file) {
        fetch(file)
          .then(response => response.text())
          .then(data => {
            document.getElementById(id).innerHTML = data;
          })
          .catch(err => console.error(`Błąd wczytywania ${file}:`, err));
      }

      loadHTML("header-container", "header.html");
      loadHTML("menu-container", "menu.html");
      loadHTML("footer-container", "footer.html");

      // Zegar
      function updateClock() {
          const now = new Date();
          const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
          const date = now.toLocaleDateString('pl-PL', options);
          const time = now.toLocaleTimeString('pl-PL');
          document.getElementById('clock-container').innerHTML = date + "<br>" + time;
      }
      setInterval(updateClock, 1000);
      updateClock();

      // Hamburger menu
      function toggleMenu() {
          const menu = document.querySelector("#menu-container");
          if(menu) menu.classList.toggle("active");
      }
    </script>

</body>
</html>
